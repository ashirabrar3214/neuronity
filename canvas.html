<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Easy Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="canvas.css">
    <link rel="stylesheet" href="agent-training.css">
</head>

<body class="canvas-mode">
    <div id="agent-canvas">
        <div class="grid-layer"></div>
        <svg class="connections-layer"></svg>
        <div id="nodes-layer"></div>
    </div>

    <!-- User Profile Menu -->
    <div class="user-menu-container">
        <button class="user-menu-trigger" id="user-menu-trigger">
            <div class="user-avatar">A</div>
            <div class="user-info">
                <span class="user-name">Ashir</span>
                <span class="user-plan">Pro plan</span>
            </div>
            <svg class="user-menu-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </button>

        <div class="user-dropdown" id="user-dropdown">
            <div class="dropdown-email">ashirabrar3214@gmail.com</div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" data-action="settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>Settings</span>
                <span class="dropdown-shortcut">Ctrl+,</span>
            </button>
            <button class="dropdown-item has-submenu" data-action="language">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                <span>Language</span>
                <svg class="submenu-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
            <button class="dropdown-item" data-action="help">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>Get help</span>
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" data-action="upgrade">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
                <span>Upgrade plan</span>
            </button>
            <button class="dropdown-item" data-action="extensions">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
                <span>Get apps and extensions</span>
            </button>
            <button class="dropdown-item has-submenu" data-action="learn-more">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <span>Learn more</span>
                <svg class="submenu-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item dropdown-item-danger" data-action="logout">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Log out</span>
            </button>
        </div>
    </div>

    <!-- Sliding Sidebar Overlay for Training -->
    <div id="training-overlay" class="training-side-panel">
        <div id="panel-resizer" class="resizer resizer-left"></div>

        <div class="training-container">
            <header class="chat-header">
                <button id="close-training-btn">← Close</button>
                <div class="header-left">
                    <h2 id="agent-name">Agent</h2>
                    <div class="mode-toggle-container">
                        <span class="mode-label">Work</span>
                        <label class="switch">
                            <input type="checkbox" id="work-train-toggle" checked>
                            <span class="slider round"></span>
                        </label>
                        <span class="mode-label active" id="train-label">Train</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div id="auto-save-status" class="save-status">Saved</div>
                    <button id="clear-chat-btn" title="Clear chat history">🗑 Clear Chat</button>
                </div>
            </header>

            <div class="content-wrapper">
                <aside class="details-sidebar" id="details-sidebar">
                    <div class="sidebar-header">
                        <span>Configuration</span>
                    </div>

                    <div class="sidebar-section">
                        <div class="section-title">Identity</div>
                        <div class="detail-item">
                            <label>Name</label>
                            <input type="text" id="detail-name" class="sidebar-input">
                        </div>
                        <div class="detail-item">
                            <label>Description</label>
                            <textarea id="detail-description" class="sidebar-textarea" rows="3"></textarea>
                        </div>
                        <div class="detail-item">
                            <label>Main Responsibility</label>
                            <input type="text" id="detail-responsibility" class="sidebar-input"
                                placeholder="What is their main task?">
                        </div>
                        <div class="detail-item">
                            <label>Tools</label>
                            <select id="detail-tools" class="sidebar-select">
                                <option>Gmail</option>
                                <option>Google Meet</option>
                                <option>Zoom</option>
                                <option>Google Calendar</option>
                                <option>Microsoft Teams</option>
                                <option>Google Docs</option>
                                <option>Google Sheets</option>
                                <option>Custom</option>
                            </select>
                        </div>
                    </div>



                    <div class="sidebar-section">
                        <div class="section-title">Communication</div>
                        <div class="detail-item">
                            <label>Channel</label>
                            <select id="detail-channel" class="sidebar-select">
                                <option value="Gmail">Gmail</option>
                                <option value="telegram">Telegram</option>
                                <option value="Discord">Discord</option>
                                <option value="WhatsApp">WhatsApp</option>
                                <option value="iMessage">iMessage</option>
                                <option value="Terminal">Terminal</option>
                            </select>
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <div class="section-title">Environment</div>
                        <div class="detail-item">
                            <label>Working Dir</label>
                            <div class="sidebar-file-input">
                                <input type="text" id="detail-workdir" class="sidebar-input"
                                    placeholder="Select folder..." readonly>
                                <button id="browse-workdir-btn" class="sidebar-browse-btn">📂</button>
                            </div>
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <div class="section-title">Capabilities</div>
                        <div id="capabilities-grid" class="capabilities-grid">
                            <button class="cap-btn" data-cap="web search">web search</button>
                            <button class="cap-btn" data-cap="thinking">thinking</button>
                            <button class="cap-btn" data-cap="report generation">report generation</button>
                            <button class="cap-btn" data-cap="scheduling">scheduling</button>
                            <button class="cap-btn" data-cap="file access">file access</button>
                        </div>
                    </div>
                </aside>
                <div id="sidebar-resizer" class="resizer resizer-middle"></div>
                <div class="chat-main-column">
                    <div class="chat-area" id="chat-area">
                        <div class="message agent-message">
                            What are we learning today?
                        </div>
                    </div>
                    <!-- Autonomous Plan Execution Area (Hidden by default) -->
                    <div id="autonomous-plan-area" class="autonomous-plan-area" style="display: none;">
                        <div class="plan-header">
                            <span>📋 Execution Plan Ready</span>
                            <button id="close-plan-btn" class="close-plan-btn">×</button>
                        </div>
                        <div class="plan-content" id="plan-content"></div>
                        <button id="start-execution-btn" class="start-autonomous-btn">▶ Start Execution</button>
                    </div>

                    <div class="input-area">
                        <button class="attach-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                                </path>
                            </svg>
                        </button>
                        <input type="text" id="message-input" placeholder="Type your instructions...">
                        <button id="send-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Workmap Tree Canvas (replaces the agent canvas when open) -->
    <div id="workmap-overlay" style="display:none;">
        <div class="workmap-toolbar">
            <button id="workmap-back-btn" class="workmap-toolbar-btn">← Back to Canvas</button>
            <span id="workmap-title" class="workmap-toolbar-title">Project Workmap</span>
            <div class="workmap-toolbar-actions">
                <div class="wm-deadline-group">
                    <label class="wm-deadline-label">Deadline</label>
                    <input type="number" id="wm-deadline-input" class="wm-deadline-input" min="1" placeholder="hrs">
                    <span class="wm-deadline-unit">hrs</span>
                </div>
                <button id="workmap-add-node-btn" class="workmap-toolbar-btn workmap-btn-add">+ Add Node</button>
                <span id="workmap-status-badge" class="workmap-badge">PAUSED</span>
                <button id="workmap-play-btn" class="workmap-toolbar-btn workmap-btn-play">▶ Play</button>
                <button id="workmap-pause-btn" class="workmap-toolbar-btn workmap-btn-pause">⏸ Pause</button>
            </div>
        </div>
        <div id="workmap-tree-container">
            <div class="wm-grid-layer"></div>
            <div id="workmap-pan-layer">
                <svg id="workmap-edges"></svg>
                <div id="workmap-nodes"></div>
            </div>
        </div>
    </div>

    <!-- Workmap Node Edit Modal -->
    <div id="wm-node-modal-overlay" class="wm-modal-overlay" style="display:none;">
        <div class="wm-modal">
            <div class="wm-modal-header">
                <span class="wm-modal-title" id="wm-modal-title">Edit Node</span>
                <button id="wm-modal-close" class="wm-modal-close-btn">&times;</button>
            </div>
            <div class="wm-modal-body">
                <input type="hidden" id="wm-edit-node-id">
                <div class="wm-field">
                    <label>Label (short title)</label>
                    <input type="text" id="wm-edit-label" placeholder="e.g. Oil Price Analysis" maxlength="40">
                </div>
                <div class="wm-field">
                    <label>Task Description</label>
                    <textarea id="wm-edit-task" rows="3" placeholder="What should this node do?"></textarea>
                </div>
                <div class="wm-field-row">
                    <div class="wm-field wm-field-half">
                        <label>Assigned Agent</label>
                        <select id="wm-edit-agent"></select>
                    </div>
                    <div class="wm-field wm-field-half">
                        <label>Status</label>
                        <select id="wm-edit-status">
                            <option value="PENDING">PENDING</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="COMPLETED">COMPLETED</option>
                            <option value="ERROR">ERROR</option>
                        </select>
                    </div>
                </div>
                <div class="wm-field-row">
                    <div class="wm-field wm-field-half">
                        <label>Dependencies</label>
                        <div id="wm-edit-deps" class="wm-deps-container"></div>
                    </div>
                    <div class="wm-field wm-field-half">
                        <label>Est. Time (minutes)</label>
                        <input type="number" id="wm-edit-time" min="0" placeholder="0">
                    </div>
                </div>
            </div>
            <div class="wm-modal-footer">
                <button id="wm-modal-delete" class="wm-modal-btn wm-btn-delete">Delete Node</button>
                <div class="wm-modal-footer-right">
                    <button id="wm-modal-cancel" class="wm-modal-btn wm-btn-cancel">Cancel</button>
                    <button id="wm-modal-save" class="wm-modal-btn wm-btn-save">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Workmap Right-Click Context Menu -->
    <div id="wm-context-menu" class="wm-context-menu" style="display:none;">
        <button class="wm-ctx-item" data-action="add-step">+ Add Step Here</button>
        <button class="wm-ctx-item wm-ctx-edit" data-action="edit-step" style="display:none;">Edit Step</button>
        <button class="wm-ctx-item wm-ctx-danger" data-action="remove-step" style="display:none;">Remove Step</button>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="custom-confirm-overlay" class="custom-modal-overlay" style="display: none;">
        <div class="custom-modal-box">
            <div id="custom-confirm-message" class="custom-modal-message">Are you sure?</div>
            <div class="custom-modal-actions">
                <button id="custom-confirm-cancel" class="custom-btn-secondary">Cancel</button>
                <button id="custom-confirm-ok" class="custom-btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="canvas.js"></script>
    <script src="agent-training.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.agentCanvasInstance = new AgentCanvas('agent-canvas');

            // ── User Menu Toggle ──
            const trigger = document.getElementById('user-menu-trigger');
            const dropdown = document.getElementById('user-dropdown');

            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = dropdown.classList.toggle('open');
                trigger.classList.toggle('active', isOpen);
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.user-menu-container')) {
                    dropdown.classList.remove('open');
                    trigger.classList.remove('active');
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    dropdown.classList.remove('open');
                    trigger.classList.remove('active');
                }
            });

            // Handle menu item clicks (placeholder actions for now)
            dropdown.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', () => {
                    const action = item.dataset.action;
                    console.log('Menu action:', action);
                    dropdown.classList.remove('open');
                    trigger.classList.remove('active');
                });
            });
        });
    </script>
</body>

</html>
